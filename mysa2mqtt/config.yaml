name: Mysa2MQTT
version: "1.0.2"
slug: mysa2mqtt
description: Run mysa2mqtt for Mysa thermostats using MQTT discovery
url: https://github.com/YOUR_GITHUB_USERNAME/mysa2mqtt-ha-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
map:
  - addon_config:rw
options:
  mysa_username: ""
  mysa_password: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: "mysa2mqtt"
  homeassistant_discovery: true
  discovery_prefix: "homeassistant"
  log_level: "info"
schema:
  mysa_username: str
  mysa_password: password
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_base_topic: str
  homeassistant_discovery: bool
  discovery_prefix: str
  log_level: list(trace|debug|info|warn|error)
