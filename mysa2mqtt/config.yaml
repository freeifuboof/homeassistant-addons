name: Mysa2MQTT
version: "1.1.0"
slug: mysa2mqtt
description: Bridge Mysa thermostats to MQTT with Home Assistant discovery
url: https://github.com/freeifuboof/homeassistant-addons/tree/main/mysa2mqtt
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
map:
  - addon_config:rw
options:
  mysa_username: ""
  mysa_password: ""
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: mysa2mqtt
  mqtt_client_name: mysa2mqtt
  temperature_unit: F
  log_level: info
  log_format: pretty
schema:
  mysa_username: str
  mysa_password: password
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
  mqtt_client_name: str
  temperature_unit: list(C|F)
  log_level: list(silent|fatal|error|warn|info|debug|trace)
  log_format: list(pretty|json)
